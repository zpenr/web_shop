services:
  api:
    build: 
        context: .
        dockerfile: src/api/Dockerfile
    image: api-web-site
    container_name: api-web-site
    command: "python app/main.py"
    env_file:
      - .dev.env
    volumes:
      - ./src/api:/project
      - ./certs:/certs  
    ports:
      - "8000:8000"

  web:
    image: nginx:alpine
    volumes:
      - ./src/frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api