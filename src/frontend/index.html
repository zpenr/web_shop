<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин - Панель управления</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Экран авторизации -->
        <div id="auth-section" class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <ul class="nav nav-tabs" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Вход</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Регистрация</button>
                        </li>
                    </ul>
                    <div class="tab-content p-4 border border-top-0 rounded-bottom">
                        <!-- Вход -->
                        <div class="tab-pane fade show active" id="login" role="tabpanel">
                            <form id="login-form">
                                <div class="mb-3">
                                    <label for="login-login" class="form-label">Логин</label>
                                    <input type="text" class="form-control" id="login-login" required>
                                </div>
                                <div class="mb-3">
                                    <label for="login-password" class="form-label">Пароль</label>
                                    <input type="password" class="form-control" id="login-password" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Войти</button>
                                <div id="login-error" class="text-danger mt-2"></div>
                            </form>
                        </div>
                        <!-- Регистрация -->
                        <div class="tab-pane fade" id="register" role="tabpanel">
                            <form id="register-form">
                                <div class="mb-3">
                                    <label for="reg-name" class="form-label">Имя</label>
                                    <input type="text" class="form-control" id="reg-name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="reg-surname" class="form-label">Фамилия</label>
                                    <input type="text" class="form-control" id="reg-surname" required>
                                </div>
                                <div class="mb-3">
                                    <label for="reg-login" class="form-label">Логин</label>
                                    <input type="text" class="form-control" id="reg-login" required>
                                </div>
                                <div class="mb-3">
                                    <label for="reg-password" class="form-label">Пароль</label>
                                    <input type="password" class="form-control" id="reg-password" required>
                                </div>
                                <div class="mb-3">
                                    <label for="reg-password2" class="form-label">Повторите пароль</label>
                                    <input type="password" class="form-control" id="reg-password2" required>
                                </div>
                                <div class="mb-3">
                                    <label for="reg-id-job" class="form-label">Должность (ID)</label>
                                    <select class="form-select" id="reg-id-job" required>
                                        <option value="">Загрузка...</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                                <div id="register-error" class="text-danger mt-2"></div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Основное приложение -->
        <div id="main-section" style="display: none;">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">Магазин</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item"><a class="nav-link" href="#" data-section="products">Товары</a></li>
                            <li class="nav-item"><a class="nav-link" href="#" data-section="categories">Категории</a></li>
                            <li class="nav-item"><a class="nav-link" href="#" data-section="employees">Сотрудники</a></li>
                            <li class="nav-item"><a class="nav-link" href="#" data-section="sales">Продажи</a></li>
                            <li class="nav-item"><a class="nav-link" href="#" data-section="receipts">Чеки</a></li>
                            <li class="nav-item"><a class="nav-link" href="#" data-section="jobs">Должности</a></li>
                            <li class="nav-item"><a class="nav-link" href="#" data-section="manager">Управление</a></li>
                        </ul>
                        <span class="navbar-text me-3" id="user-info"></span>
                        <button class="btn btn-outline-light" id="logout-btn">Выйти</button>
                    </div>
                </div>
            </nav>

            <div class="container mt-4">
                <div id="content-area">
                    <!-- Динамический контент -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
